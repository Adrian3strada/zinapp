services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      USE_SQLITE: "True"
      SERVE_MEDIA: "True"
      ALLOWED_HOSTS: "*"
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./media:/app/media
    restart: unless-stopped

