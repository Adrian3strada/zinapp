# Producción — PostgreSQL + API (+ Caddy HTTPS opcional)
# Uso: copy .env.production.example .env  (rellena SECRET_KEY, DB_PASSWORD, CRON_SECRET)
#      docker compose -f docker-compose.prod.yml up -d --build
#      docker compose -f docker-compose.prod.yml --profile https up -d --build

name: zinapp-prod

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-zinapp_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerido en .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-zinapp_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    image: zinapp-api:prod
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8000}
      USE_SQLITE: "False"
      DEBUG: "False"
      DB_HOST: db
      DB_PORT: "5432"
      SERVE_MEDIA: ${SERVE_MEDIA:-True}
      SEED_DATA: ${SEED_DATA:-false}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
    ports:
      - "${API_PUBLISH_PORT:-8000}:${PORT:-8000}"
    expose:
      - "${PORT:-8000}"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  caddy:
    profiles: ["https"]
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  media:
  caddy_data:
  caddy_config:
