{% if is_paginated %}
<div class="card-footer clearfix">
  <ul class="pagination pagination-sm m-0 float-right">
    {% if page_obj.has_previous %}
    <li class="page-item">
      <a class="page-link" href="?{% if pagination_query %}{{ pagination_query }}&{% endif %}page={{ page_obj.previous_page_number }}">«</a>
    </li>
    {% else %}
    <li class="page-item disabled"><span class="page-link">«</span></li>
    {% endif %}

    <li class="page-item active">
      <span class="page-link">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
    </li>

    {% if page_obj.has_next %}
    <li class="page-item">
      <a class="page-link" href="?{% if pagination_query %}{{ pagination_query }}&{% endif %}page={{ page_obj.next_page_number }}">»</a>
    </li>
    {% else %}
    <li class="page-item disabled"><span class="page-link">»</span></li>
    {% endif %}
  </ul>
</div>
{% endif %}
