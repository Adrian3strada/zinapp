{% load static %}
<script src="{% static 'dashboard/vendor/jquery/jquery.min.js' %}"></script>
<script src="{% static 'dashboard/vendor/bootstrap/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'dashboard/vendor/adminlte/adminlte.min.js' %}"></script>
<script>
$(function () {
  $('.nav-sidebar .nav-link').tooltip({
    placement: 'right',
    trigger: 'hover',
    title: function () { return $(this).find('p').text().trim().split('\n')[0]; },
    container: 'body',
    boundary: 'window',
  }).on('show.bs.tooltip', function () {
    return $('body').hasClass('sidebar-collapse') && $(window).width() >= 992;
  });
});
</script>
