<tr class="zin-empty-row">
  <td colspan="{{ colspan }}" class="p-0 border-0">
    <div class="zin-empty-state">
      <div class="zin-empty-icon" aria-hidden="true"><i class="fas {{ icon|default:'fa-inbox' }}"></i></div>
      <p class="zin-empty-title">{{ title }}</p>
      {% if message %}<p class="zin-empty-message">{{ message }}</p>{% endif %}
      {% if action_url %}
      <a href="{{ action_url }}" class="btn btn-primary btn-sm mt-2">
        <i class="fas {{ action_icon|default:'fa-plus' }} mr-1"></i> {{ action_label }}
      </a>
      {% endif %}
    </div>
  </td>
</tr>
