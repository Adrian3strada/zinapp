{% extends "dashboard/base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card card-outline card-danger">
      <div class="card-header"><h3 class="card-title">Confirmar eliminación</h3></div>
      <div class="card-body">
        <p>¿Eliminar <strong>{{ object_label }}</strong>? Esta acción no se puede deshacer.</p>
        <form method="post" class="form-actions mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger"><i class="fas fa-trash mr-1"></i> Sí, eliminar</button>
          <a href="{{ cancel_url }}" class="btn btn-default">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
