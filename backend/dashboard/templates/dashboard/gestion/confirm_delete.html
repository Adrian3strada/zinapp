{% extends "dashboard/base.html" %}

{% block content %}
<p class="gestion-back"><a href="{{ cancel_url }}">← Volver</a></p>

<div class="panel-card" style="max-width:480px;">
  <div class="panel-card-header"><h3>Confirmar eliminación</h3></div>
  <div class="panel-card-body padded">
    <p>¿Eliminar <strong>{{ object_label }}</strong>? Esta acción no se puede deshacer.</p>
    <form method="post" class="form-actions" style="margin-top:20px;">
      {% csrf_token %}
      <button type="submit" class="btn btn-primary" style="width:auto;background:var(--error);">Sí, eliminar</button>
      <a href="{{ cancel_url }}" class="btn btn-ghost" style="width:auto;">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
