# PostgreSQL local (desarrollo) — usar junto con docker-compose.yml
# Uso:
#   copy .env.docker.example .env
#   (en .env: USE_SQLITE=False, DB_HOST=db, DB_PORT=5432)
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d --build

name: zinapp-dev

services:
  api:
    depends_on:
      db:
        condition: service_healthy
    environment:
      USE_SQLITE: "False"
      DB_HOST: db
      DB_PORT: "5432"

  db:
    profiles: []
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-zinapp_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PUBLISH_PORT:-5433}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-zinapp_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata_dev:
