services:
  - type: web
    name: zinapp-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: SERVE_MEDIA
        value: "True"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zinapp-db
          property: connectionString

databases:
  - name: zinapp-db
    plan: free
    databaseName: zinapp_db
    user: zinapp
