name: Keep Railway API awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ZinApp health endpoint
        run: |
          curl -fsS --retry 3 --retry-delay 5 --max-time 90 \
            https://zinapp-api-production.up.railway.app/api/health/
