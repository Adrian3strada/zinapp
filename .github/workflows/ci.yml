name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: django-insecure-ci-only-key-that-is-long-enough
      DEBUG: "True"
      USE_SQLITE: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      SERVE_MEDIA: "True"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py test accounts accounts.test_security
      - run: python manage.py test dashboard
      - run: python manage.py test local_services
      - run: python manage.py test orders
      - run: python manage.py test restaurants

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      # Informational until the existing TypeScript baseline is remediated.
      - run: npx tsc --noEmit
        continue-on-error: true
